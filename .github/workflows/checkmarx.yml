name: Checkmarx Scan (CxFlow)

on:
  pull_request:
    branches: [ main ]

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v3

      - name: Run Checkmarx Scan via CxFlow
        run: |
          docker run --rm \
            -e CHECKMARX_SERVER=${{ secrets.CHECKMARX_SERVER }} \
            -e CHECKMARX_USERNAME=${{ secrets.CHECKMARX_USERNAME }} \
            -e CHECKMARX_PASSWORD=${{ secrets.CHECKMARX_PASSWORD }} \
            -e GITHUB_TOKEN=${{ secrets.GH_TOKEN }} \
            -v ${{ github.workspace }}:/src \
            checkmarx/cx-flow:latest \
            --scan \
            --app=${{ github.repository }} \
            --repo-name=${{ github.repository }} \
            --branch=${{ github.head_ref }} \
            --namespace=${{ github.repository_owner }} \
            --repo=${{ github.event.repository.name }} \
            --merge-id=${{ github.event.pull_request.number }} \
            --bug-tracker=GITHUBPULL

      - name: Upload SARIF (optional)
        uses: github/codeql-action/upload-sarif@v1
        with:
          sarif_file: cx.sarif
