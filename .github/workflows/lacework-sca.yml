name: Daily SCA Scan on Main Branch

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  security-events: write
  contents: read
  actions: read

jobs:
  daily_scan:
    runs-on: ubuntu-latest

    steps:
      - name: Install Lacework CLI
        run: |
          curl https://raw.githubusercontent.com/lacework/go-sdk/main/cli/install.sh | bash
          lacework configure \
            -a ${{ secrets.LW_ACCOUNT_NAME }} \
            -k ${{ secrets.LW_API_KEY }} \
            -s ${{ secrets.LW_API_SECRET }} \
            --noninteractive
          lacework component install sca

      - name: Run Lacework SCA Scan (Upload to FortiCNAPP)
        env:
          SCA_GIT_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          lacework sca scan \
            https://github.com/Belorta/lacework-feature-test.git \
            --basic-env-auth=true \
            --save-results=true \
            --deployment=ci \
            -f sarif \
            -o lacework-scan.sarif

      - name: Upload SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: lacework-scan.sarif
