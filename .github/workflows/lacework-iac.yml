name: lacework-iac-example

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Scan the repo for vulnerabilities in IaC
        run: |
          set +e
          echo "LW_ACCOUNT_NAME=${{ secrets.LW_ACCOUNT_NAME }}" >> env.list
          echo "LW_API_KEY=${{ secrets.LW_API_KEY }}" >> env.list
          echo "LW_API_SECRET=${{ secrets.LW_API_SECRET }}" >> env.list
          docker run \
            --env-file env.list \
            -v "$(pwd):/app/src" \
            lacework/codesec:stable \
            lacework iac scan -d /app/src/terraform
          SCAN_EXIT_STATUS=$?
          echo "SCAN_EXIT_STATUS=$SCAN_EXIT_STATUS" >> "$GITHUB_ENV"
          set -e

      - name: Scan Status
        run: exit $(($SCAN_EXIT_STATUS))
